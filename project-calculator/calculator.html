<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="cal.css">
</head>
<body>
    <div class="main">
        <div><textarea name="textbox" id="textbox">0</textarea></div>
        <div class="content">
            <div class="ROW ">
            <div id="AC"><button class="inner_colour">AC</button></div>
            <div id="DE"><button class="inner_colour">DE</button></div>
            <div id="med"><button class="inner_colour">%</button></div>
            <div id="med"><button class="inner_colour">/</button></div>
           </div>
            <div class="ROW">
            <div id="num"><button>7</button></div>
            <div id="num"><button>8</button></div>
            <div id="num"><button>9</button></div>
            <div id="med"><button class="inner_colour">*</button></div>
            </div>
            <div class="ROW">
            <div id="num"><button>4</button></div>
            <div id="num"><button>5</button></div>
            <div id="num"><button>6</button></div>
            <div id="med"><button class="inner_colour">-</button></div></div>
            <div class="ROW">
            <div id="num"><button>1</button></div>
            <div id="num"><button>2</button></div>
            <div id="num"><button>3</button></div>
            <div id="med"><button class="inner_colour">+</button></div>
            </div>
            <div class="ROW">
            <div id="num"><button>00</button></div>
            <div id="num"><button>0</button></div>
            <div id="num"><button>.</button></div>
            <div id="ans"><button class="outer_colour">=</button></div>

            </div>
        </div>

    </div>
<script src="calculato.js"></script>
</body>
</html>
